name: CI - Build & Push to ACR

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Azure Container Registry
  run: |
    docker login ${{ secrets.ACR_LOGIN_SERVER }} \
    -u ${{ secrets.ACR_USERNAME }} \
    -p ${{ secrets.ACR_PASSWORD }}
    