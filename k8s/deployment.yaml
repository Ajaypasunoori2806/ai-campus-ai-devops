apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-campus-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-campus
  template:
    metadata:
      labels:
        app: ai-campus
    spec:
      containers:
      - name: ai-campus
        image: aiopsregistry123.azurecr.io/ai-campus:latest
        ports:
        - containerPort: 8000
