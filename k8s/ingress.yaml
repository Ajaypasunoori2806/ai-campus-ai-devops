apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-campus-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - 20.207.66.72.nip.io   # <-- your real IP here
    secretName: ai-campus-tls
  rules:
  - host: 20.207.66.72.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-campus-service
            port:
              number: 80